<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Scandal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/collections.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-logo">
      <span class="logo-ornament">✦</span>
      <span class="logo-text">Scandal</span>
      <span class="logo-ornament">✦</span>
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="cart.html" class="nav-cart">Cart <span class="cart-badge" id="cartCount">0</span></a></li>
      <li><a href="login.html" class="active nav-login-btn">Login</a></li>
    </ul>
    <button class="hamburger" id="hamburger">☰</button>
  </nav>

  <section class="login-section">
    <div class="login-card" id="loginCard">
      <div class="login-logo">✦ Scandal ✦</div>
      <p class="login-tagline">Traditional Men's Wear</p>
      <h2 id="formTitle">Welcome Back</h2>

      <div id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••"/>
        </div>
        <button class="form-submit" onclick="handleLogin()">Login</button>
        <p class="login-switch">
          Don't have an account? <a href="#" onclick="toggleForm()">Sign up</a>
        </p>
        <p class="skip-link">
          Just browsing? <a href="index.html">Continue without login →</a>
        </p>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your name"/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="••••••••"/>
        </div>
        <button class="form-submit" onclick="handleRegister()">Create Account</button>
        <p class="login-switch">
          Already have an account? <a href="#" onclick="toggleForm()">Login</a>
        </p>
        <p class="skip-link">
          Just browsing? <a href="index.html">Continue without login →</a>
        </p>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
  if (localStorage.getItem('Scandal_user')) {
    window.location.href = 'index.html';
  }
</script>
  <script> 
    function toggleForm() {
      const loginF = document.getElementById('loginForm');
      const regF = document.getElementById('registerForm');
      const title = document.getElementById('formTitle');
      if (loginF.style.display === 'none') {
        loginF.style.display = 'block';
        regF.style.display = 'none';
        title.textContent = 'Welcome Back';
      } else {
        loginF.style.display = 'none';
        regF.style.display = 'block';
        title.textContent = 'Create Account';
      }
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showToast('Please fill in all fields'); return; }
      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('Scandal_user', JSON.stringify(data.user));
          localStorage.setItem('Scandal_token', data.token);
          showToast('Login successful! Welcome back.');
          setTimeout(() => window.location.href = 'index.html', 1200);
        } else {
          showToast(data.message || 'Login failed. Check your credentials.');
        }
      } catch (e) {
        showToast('Could not connect to server. Please try again.');
      }
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      if (!name || !email || !password) { showToast('Please fill in all fields'); return; }
      try {
        const res = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          showToast('Account created! Please log in.');
          setTimeout(() => toggleForm(), 1200);
        } else {
          showToast(data.message || 'Registration failed.');
        }
      } catch (e) {
        showToast('Could not connect to server. Please try again.');
      }
    }
  </script>
</body>
</html>
